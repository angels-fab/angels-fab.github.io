<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>데모 코멘트 드래그 — 자가검증</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 20px; background: #0f1116; color: #dfe6f2; font-family: system-ui, -apple-system, "Malgun Gothic", sans-serif; }
  .wrap { max-width: 620px; margin: 0 auto; }
  .panel { background: #14161d; border: 1px solid #2a2e3a; border-radius: 10px; padding: 10px; }
  .board { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); grid-auto-rows: 1px; grid-auto-flow: row dense; column-gap: 10px; row-gap: 0; align-items: start; }
  .item { align-self: start; min-width: 0; cursor: grab; }
  .card { border-radius: 8px; overflow: hidden; background: #1a1d26; box-shadow: 0 0 5px rgba(0,0,0,.3); }
  .head { display: flex; align-items: center; gap: 7px; padding: 6px 10px; }
  .title { flex: 1; min-width: 0; font-size: 13px; font-weight: 700; }
  .body { padding: 7px 10px 10px; font-size: 12.5px; line-height: 1.5; color: #c4ccd8; border-top: 1px solid rgba(255,255,255,.12); }
  .ph { border: 2px dashed #4a90e2; background: rgba(74,144,226,.08); border-radius: 8px; align-self: start; min-width: 0; }
  .overlay { position: fixed; z-index: 50; pointer-events: none; opacity: .95; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,.48); }
  #out { margin-top: 14px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel"><div class="board" id="board"></div></div>
  <div id="out"></div>
</div>
<script>
  var GAP = 10;
  var COLORS = ['#4a90e2','#2bb673','#e2724a','#8a7bd8','#c9a227','#d15aa0'];
  // 카드 데이터(높이 다양하게)
  var DATA = [
    { id:1, t:'FIB 밀링 속도', a:'김민석', c:0, b:'짧은 메모.' },
    { id:2, t:'세정 조건', a:'이서연', c:1, b:'IPA 린스 후 잔류 확인 필요. 두 줄 정도 길이의 본문으로 높이를 다르게.' },
    { id:3, t:'대면적 가공', a:'박준호', c:2, b:'~1mm급은 레이저가 빠름. 조건표 별도 공유. 세 줄쯤 되는 조금 더 긴 본문으로 masonry 높이 차이를 만든다.' },
    { id:4, t:'샘플 준비', a:'최유진', c:3, b:'유리 기판 2종.' },
    { id:5, t:'다음 일정', a:'정하늘', c:4, b:'4월 3주차 방문 예정.' },
    { id:6, t:'경쟁 비교', a:'김민석', c:0, b:'타사 대비 종합 정리. 자동 강조.' }
  ];

  // ── 상태(React 컴포넌트 복제) ──
  var base = DATA.map(function(d){ return d.id; });
  var dragId = null, overIndex = 0;
  var drag = null, pending = null, overIndexRef = 0, switchLockUntil = 0, lastPointer = { x:0, y:0 };
  var flipRects = {}; var animateCount = 0; var sawPlaceholder = false; var sawOverlay = false;
  var committedOrder = null;
  var SWITCH_LOCK = 180, ACT = 8;

  var board = document.getElementById('board'), out = document.getElementById('out');

  function byId(id){ return DATA.find(function(d){ return d.id === id; }); }
  function displayIds(){
    if (dragId == null) return base.slice();
    var rest = base.filter(function(id){ return id !== dragId; });
    var idx = Math.max(0, Math.min(overIndex, rest.length));
    return rest.slice(0, idx).concat([dragId]).concat(rest.slice(idx));
  }

  var cellEls = {}; // id -> item el

  function render() {
    // FLIP 기준선(이전 위치)
    board.innerHTML = ''; cellEls = {};
    var ids = displayIds();
    ids.forEach(function(id){
      if (id === dragId) {
        sawPlaceholder = true;
        var ph = document.createElement('div'); ph.className = 'ph';
        ph.style.gridRowEnd = 'span ' + ((drag ? drag.height : 80) + GAP);
        ph.style.minHeight = (drag ? drag.height : 80) + 'px';
        board.appendChild(ph);
        return;
      }
      var d = byId(id);
      var item = document.createElement('div'); item.className = 'item'; item.setAttribute('data-memo-id', String(id));
      var card = document.createElement('div'); card.className = 'card'; card.style.border = '1px solid ' + COLORS[d.c];
      card.innerHTML = '<div class="head"><span class="title" style="color:'+COLORS[d.c]+'">'+d.t+'</span></div><div class="body">'+d.b+'</div>';
      item.appendChild(card); board.appendChild(item); cellEls[id] = item;
    });
    layoutSpans();
    // FLIP
    if (drag) {
      Object.keys(cellEls).forEach(function(id){
        var el = cellEls[id]; var r = el.getBoundingClientRect();
        var now = { left: r.left + scrollX, top: r.top + scrollY };
        var prev = flipRects[id];
        if (prev && (Math.abs(prev.left-now.left) > 0.5 || Math.abs(prev.top-now.top) > 0.5)) {
          animateCount++;
          el.animate([{ transform:'translate('+(prev.left-now.left)+'px,'+(prev.top-now.top)+'px)' },{ transform:'translate(0,0)' }], { duration:220 });
        }
        flipRects[id] = now;
      });
    }
    renderOverlay();
  }
  function layoutSpans() {
    [].slice.call(board.children).forEach(function(el){
      if (el.classList.contains('ph')) return;
      el.style.gridRowEnd = 'span ' + (Math.round(el.getBoundingClientRect().height) + GAP);
    });
  }
  var overlayEl = null;
  function renderOverlay() {
    if (overlayEl) { overlayEl.remove(); overlayEl = null; }
    if (dragId == null || !drag) return;
    sawOverlay = true;
    var d = byId(dragId);
    overlayEl = document.createElement('div'); overlayEl.className = 'overlay';
    overlayEl.style.width = drag.width + 'px';
    overlayEl.style.left = (lastPointer.x - drag.offsetX) + 'px';
    overlayEl.style.top = (lastPointer.y - drag.offsetY) + 'px';
    overlayEl.innerHTML = '<div class="card" style="border:1px solid '+COLORS[d.c]+'"><div class="head"><span class="title" style="color:'+COLORS[d.c]+'">'+d.t+'</span></div><div class="body">'+d.b+'</div></div>';
    document.body.appendChild(overlayEl);
  }

  function beginDrag(x, y) {
    if (!pending || drag) return;
    var originIndex = base.indexOf(pending.id);
    flipRects = {};
    Object.keys(cellEls).forEach(function(id){ var r = cellEls[id].getBoundingClientRect(); flipRects[id] = { left:r.left+scrollX, top:r.top+scrollY }; });
    drag = { id: pending.id, width: pending.rect.width, height: pending.rect.height, offsetX: pending.offsetX, offsetY: pending.offsetY };
    overIndexRef = originIndex; overIndex = originIndex; dragId = pending.id; switchLockUntil = 0;
    lastPointer = { x:x, y:y };
    render();
  }
  function updateDrag(x, y) {
    if (!drag) return;
    lastPointer = { x:x, y:y };
    if (overlayEl) { overlayEl.style.left = (x - drag.offsetX)+'px'; overlayEl.style.top = (y - drag.offsetY)+'px'; }
    if (Date.now() < switchLockUntil) return;
    var stack = document.elementsFromPoint(x, y);
    var targetId = null, before = true;
    for (var i=0;i<stack.length;i++){
      var cell = stack[i].closest ? stack[i].closest('[data-memo-id]') : null;
      if (cell) { var tid = Number(cell.getAttribute('data-memo-id')); if (tid !== drag.id) { var r = cell.getBoundingClientRect(); before = y < r.top + r.height/2; targetId = tid; break; } }
    }
    if (targetId == null) return;
    var rest = base.filter(function(id){ return id !== drag.id; });
    var j = rest.indexOf(targetId);
    if (j < 0) return;
    var next = before ? j : j + 1;
    if (next !== overIndexRef) { overIndexRef = next; switchLockUntil = Date.now() + SWITCH_LOCK; overIndex = next; render(); }
  }
  function finishDrag(commit) {
    if (!drag) return;
    var rest = base.filter(function(id){ return id !== drag.id; });
    var o = commit ? Math.max(0, Math.min(overIndexRef, rest.length)) : base.indexOf(drag.id);
    var finalOrder = rest.slice(0,o).concat([drag.id]).concat(rest.slice(o));
    var changed = commit && finalOrder.join(',') !== base.join(',');
    drag = null; flipRects = {}; dragId = null; overIndex = 0;
    render();
    if (changed) { base = finalOrder; committedOrder = finalOrder.slice(); render(); }
  }

  function pd(x, y, id) {
    var el = cellEls[id]; var rect = el.getBoundingClientRect();
    pending = { id:id, startX:x, startY:y, offsetX:x-rect.left, offsetY:y-rect.top, rect:rect };
    lastPointer = { x:x, y:y };
  }
  function pm(x, y) {
    if (!pending) return;
    if (!drag) { if (Math.hypot(x-pending.startX, y-pending.startY) < ACT) return; beginDrag(x, y); }
    if (!drag) return; updateDrag(x, y);
  }
  function pu() { if (drag) finishDrag(true); pending = null; }
  function esc() { if (drag) finishDrag(false); pending = null; }

  function centerOf(id) { var r = cellEls[id].getBoundingClientRect(); return { x: r.left + r.width/2, y: r.top + r.height/2, r: r }; }

  // ── 자가검증 ──
  function runTests() {
    var log = [], pass = 0, fail = 0;
    function assert(name, cond, extra) { if (cond) { pass++; log.push('PASS ' + name); } else { fail++; log.push('FAIL ' + name + (extra?' — '+extra:'')); } }

    // 초기 렌더
    base = DATA.map(function(d){ return d.id; }); dragId=null; overIndex=0; drag=null; pending=null;
    render();
    assert('초기 6장 렌더', [].slice.call(board.querySelectorAll('[data-memo-id]')).length === 6);

    // 테스트1: 카드1을 카드5의 뒤로 드래그 → [2,3,4,5,1]
    animateCount = 0; sawPlaceholder = false; sawOverlay = false; committedOrder = null;
    var c1 = centerOf(1); pd(c1.x, c1.y, 1); pm(c1.x + 12, c1.y); // beginDrag
    var c5 = centerOf(5); pm(c5.x, c5.r.top + c5.r.height*0.75); // 카드5 하단 절반 → 뒤
    var duringPh = !!board.querySelector('.ph');
    var duringOv = !!overlayEl;
    pu();
    assert('T1 드래그 중 placeholder 표시', sawPlaceholder && duringPh);
    assert('T1 드래그 중 오버레이 표시', sawOverlay && duringOv);
    assert('T1 FLIP 애니메이션 발생', animateCount > 0, 'animateCount=' + animateCount);
    assert('T1 최종순서 [2,3,4,5,1,6]', JSON.stringify(committedOrder) === JSON.stringify([2,3,4,5,1,6]), JSON.stringify(committedOrder));
    assert('T1 종료 후 placeholder/overlay 제거', !board.querySelector('.ph') && !overlayEl);

    // 테스트2: (현재 base=[2,3,4,5,1]) 카드5를 맨 앞(카드2 앞)으로 → [5,2,3,4,1]
    animateCount = 0; committedOrder = null;
    var s2 = centerOf(5); pd(s2.x, s2.y, 5); pm(s2.x + 12, s2.y);
    var t2 = centerOf(2); pm(t2.x, t2.r.top + t2.r.height*0.25); // 카드2 상단 절반 → 앞
    pu();
    assert('T2 최종순서 [5,2,3,4,1,6]', JSON.stringify(committedOrder) === JSON.stringify([5,2,3,4,1,6]), JSON.stringify(committedOrder));

    // 테스트3: Esc 취소 → 순서 불변
    var before3 = base.slice(); committedOrder = null;
    var s3 = centerOf(3); pd(s3.x, s3.y, 3); pm(s3.x + 12, s3.y);
    var t3 = centerOf(1); pm(t3.x, t3.r.top + t3.r.height*0.75);
    esc();
    assert('T3 Esc 취소 시 순서 불변', JSON.stringify(base) === JSON.stringify(before3) && committedOrder === null, JSON.stringify(base));
    assert('T3 취소 후 placeholder/overlay 제거', !board.querySelector('.ph') && !overlayEl);

    // 테스트4: 8px 미만 이동은 드래그 시작 안 함(=더블클릭 여지)
    var before4 = base.slice();
    var s4 = centerOf(4); pd(s4.x, s4.y, 4); pm(s4.x + 4, s4.y); // 4px < 8px
    var startedTiny = !!drag; pu();
    assert('T4 8px 미만 이동은 드래그 미시작', !startedTiny && JSON.stringify(base) === JSON.stringify(before4));

    out.textContent = log.join('\n') + '\n\n' + pass + ' passed, ' + fail + ' failed';
    return { pass: pass, fail: fail, log: log };
  }
  window.__runTests = runTests;
  render();
</script>
</body>
</html>
